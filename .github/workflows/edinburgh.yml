name: EdinburghCI

on:
  push:
  pull_request:

jobs:
  build-and-test-edinburgh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LLVM 20 and Clang 20
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20 llvm-20-dev

      - name: Build Edinburgh
        run: make edinburgh

      - name: Test Edinburgh scheduler plugin
        run: make -C langs/edinburgh test

      - name: Compare MIR output
        run: make -C langs/edinburgh compare

      - name: Upload Edinburgh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edinburgh-artifacts
          path: |
            build/lib/libedinburgh_sched.so
            build/edinburgh/*.mir
