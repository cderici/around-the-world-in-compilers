name: CairoCI

on:
  push:
  pull_request:

jobs:
  build-cairo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LLVM 20 and Clang 20
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20 llvm-20-dev

      - name: Build Cairo
        run: make cairo

      - name: Upload Cairo binary
        uses: actions/upload-artifact@v4
        with:
          name: cairo-binary
          path: build/bin/cairo

  test-cairo:
    needs: build-cairo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Cairo binary
        uses: actions/download-artifact@v4
        with:
          name: cairo-binary
          path: build/bin

      - name: Test Cairo examples
        run: |
          chmod +x ./build/bin/cairo
          ./build/bin/cairo --emit-llvm langs/cairo/examples/vec_add.ath > /tmp/cairo_test.ll
          grep -q "nvptx64-nvidia-cuda" /tmp/cairo_test.ll && echo "vec_add LLVM target triple: PASS"
          grep -q "kernel_vec_add" /tmp/cairo_test.ll && echo "vec_add kernel: PASS"
          ./build/bin/cairo langs/cairo/examples/vec_add.ath > /tmp/cairo_test.ptx
          grep -q "kernel_vec_add" /tmp/cairo_test.ptx && echo "vec_add PTX: PASS"
          ./build/bin/cairo langs/cairo/examples/scale.ath > /tmp/cairo_test.ptx
          grep -q "kernel_scale" /tmp/cairo_test.ptx && echo "scale PTX: PASS"
          ./build/bin/cairo langs/cairo/examples/simple_kernel.ath > /tmp/cairo_test.ptx
          grep -q "kernel_simple" /tmp/cairo_test.ptx && echo "simple_kernel PTX: PASS"
          ! ./build/bin/cairo --run langs/cairo/examples/simple_kernel.ath > /tmp/cairo_run.out 2>&1
          grep -q "without CUDA support" /tmp/cairo_run.out && echo "non-CUDA --run guard: PASS"
